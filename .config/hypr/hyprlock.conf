background {
    monitor =
    path = screenshot   # Takes a snapshot of your desktop and blurs it
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
}

# TIME UNIT (Industrial Cyberpunk Aqua)
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgb(23, 162, 184) # Match cyber_cyan
    font_size = 55
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# INPUT FIELD (Boxy Industrial Input)
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgb(44, 53, 74)     # Match border_dim
    inner_color = rgb(24, 29, 41)     # Match bg_module
    font_color = rgb(203, 213, 225)   # Match text_main
    fade_on_empty = false
    placeholder_text = <i>ACCESS RESTRICTED...</i>
    hide_input = false
    
    # Typing error status color
    fail_color = rgb(217, 56, 86)     # Match cyber_red
    fail_text = <i>CRITICAL ERROR ($ATTEMPTS)</i>
    
    position = 0, -20
    halign = center
    valign = center
}